version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://omp:omp@postgres:5432/omp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-32-chars}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:-change-vault-key-32-chars-xxxxx}
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      MAIL_PROVIDER: mailpit
      SMTP_HOST: mailpit
      SMTP_PORT: 1026
      MAIL_FROM: noreply@localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: omp
      POSTGRES_PASSWORD: omp
      POSTGRES_DB: omp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omp -d omp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1026:1026"
      - "8025:8025"
    volumes:
      - mailpit_data:/data
    restart: unless-stopped

volumes:
  mailpit_data:
  postgres_data:
  redis_data:
